name: flutter_template_melos

packages:
  - apps/*
  - packages/*

scripts:
  # Run build_runner in all packages that use code generation
  build:runner:
    description: Generate code (freezed, json_serializable, etc.)
    exec: dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner

  # Run flutter analyze across all packages
  analyze:
    description: Run static analysis on all packages
    exec: flutter analyze --no-fatal-infos
    packageFilters:
      flutter: true

  # Run all tests
  test:
    description: Run tests in all packages
    exec: flutter test
    packageFilters:
      flutter: true

  # Clean all packages
  clean:
    description: Clean build artifacts in all packages
    exec: flutter clean
